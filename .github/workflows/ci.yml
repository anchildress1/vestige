name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ktlint + detekt + Android lint)
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Install ktlint
        run: |
          curl -sSLO --proto '=https' --tlsv1.2 https://github.com/pinterest/ktlint/releases/download/1.8.0/ktlint
          chmod +x ktlint
          sudo mv ktlint /usr/local/bin/

      - name: Install detekt
        run: |
          curl -sSL --proto '=https' --tlsv1.2 "https://github.com/detekt/detekt/releases/download/v1.23.8/detekt-cli-1.23.8.zip" -o detekt.zip
          unzip -q detekt.zip
          # The detekt-cli launcher resolves <APP_HOME>/lib/detekt-cli-1.23.8-all.jar relative to the script,
          # so the bin script and the jar must mirror the standard /usr/local/{bin,lib} layout.
          sudo mkdir -p /usr/local/lib
          sudo install -m 644 detekt-cli-1.23.8/lib/detekt-cli-1.23.8-all.jar /usr/local/lib/
          sudo install -m 755 detekt-cli-1.23.8/bin/detekt-cli /usr/local/bin/detekt

      - name: Run ktlint
        run: ktlint

      - name: Run detekt
        run: make detekt

      - name: Run Android lint
        run: make android-lint

      - name: Upload Android lint report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: android-lint-report
          path: app/build/reports/lint-results-debug.*
          retention-days: 14

  test:
    name: Test + coverage
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Run unit tests
        run: ./gradlew :core-model:test :core-inference:testDebugUnitTest :core-storage:testDebugUnitTest :app:testDebugUnitTest koverXmlReport koverVerify

      - name: Upload app HTML test report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: app-test-report
          path: app/build/reports/tests/
          retention-days: 14

      - name: Upload app JUnit test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: app-junit-results
          path: app/build/test-results/testDebugUnitTest/
          retention-days: 14

      - name: Upload core-inference JUnit test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: core-inference-junit-results
          path: core-inference/build/test-results/testDebugUnitTest/
          retention-days: 14

      - name: Upload core-model JUnit test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: core-model-junit-results
          path: core-model/build/test-results/test/
          retention-days: 14

      - name: Upload core-storage JUnit test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: core-storage-junit-results
          path: core-storage/build/test-results/testDebugUnitTest/
          retention-days: 14

      - name: Upload Kover XML report
        uses: actions/upload-artifact@v7
        with:
          name: kover-report
          path: build/reports/kover/report.xml
          retention-days: 14

  build:
    name: Build debug APK
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug

      - name: Verify no telemetry SDKs on release classpath
        run: ./gradlew verifyNoTelemetry

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: vestige-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

  sonar:
    name: SonarCloud
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Run SonarCloud analysis via Gradle
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :core-model:test :core-inference:testDebugUnitTest :core-storage:testDebugUnitTest :app:testDebugUnitTest koverXmlReport sonar -Dsonar.token="$SONAR_TOKEN"

  commitlint:
    name: Commit message lint
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate commit subjects in PR range
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: ./scripts/check-commit-msg.sh --range "$BASE_SHA..$HEAD_SHA"
