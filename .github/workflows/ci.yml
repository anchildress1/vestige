name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ktlint + detekt + Android lint + actionlint)
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Install ktlint
        run: |
          curl -sSLO https://github.com/pinterest/ktlint/releases/download/1.5.0/ktlint
          chmod +x ktlint
          sudo mv ktlint /usr/local/bin/

      - name: Install detekt
        run: |
          curl -sSL "https://github.com/detekt/detekt/releases/download/v1.23.8/detekt-cli-1.23.8.zip" -o detekt.zip
          unzip -q detekt.zip
          # The detekt-cli launcher resolves <APP_HOME>/lib/detekt-cli-1.23.8-all.jar relative to the script,
          # so the bin script and the jar must mirror the standard /usr/local/{bin,lib} layout.
          sudo mkdir -p /usr/local/lib
          sudo install -m 644 detekt-cli-1.23.8/lib/detekt-cli-1.23.8-all.jar /usr/local/lib/
          sudo install -m 755 detekt-cli-1.23.8/bin/detekt-cli /usr/local/bin/detekt

      - name: Run ktlint
        run: ktlint

      - name: Run detekt
        run: make detekt

      - name: Run Android lint
        run: make android-lint

      - name: Upload Android lint report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-lint-report
          path: app/build/reports/lint-results-debug.*
          retention-days: 14

      - name: Run actionlint
        uses: rhysd/actionlint@03d0035246f3e81f36aed592ffb4bebf33a03106 # v1.7.7

  test:
    name: Test + coverage
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Run unit tests + Kover verification
        run: ./gradlew :app:testDebugUnitTest :app:koverXmlReport :app:koverVerify

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: |
            app/build/reports/tests/
            app/build/reports/kover/
          retention-days: 14

  build:
    name: Build debug APK
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vestige-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

  sonar:
    name: SonarCloud
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Generate Kover XML report
        run: ./gradlew :app:koverXmlReport

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@689fb39b34b9aa95ebc5f8f119343ddd51542402 # v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  commitlint:
    name: Commit message lint
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate commit subjects in PR range
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: ./scripts/check-commit-msg.sh --range "$BASE_SHA..$HEAD_SHA"
