name: CodeQL

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  push:
    branches: [main]
  schedule:
    - cron: '17 4 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (java-kotlin)
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          queries: security-and-quality
          # Kapt + Compose runtime emit synthetic Java/Kotlin under build/generated/** that
          # CodeQL flags with quality rules (e.g. java/unused-parameter on ObjectBox cursors,
          # java/local-variable-is-never-read on Kotlin sealed-interface synthetic equals()).
          # Those are not source we own. The Kotlin-sealed-interface synthetics on hand-written
          # source files (LiteRtLmEngine, ModelArtifactState, NetworkGate) still surface because
          # the bytecode lives in the main classpath; those get triaged as false positives per
          # AGENTS.md security-triage rule.
          config: |
            paths-ignore:
              - '**/build/generated/**'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Build for CodeQL
        run: ./gradlew clean :app:assembleDebug --no-daemon --no-build-cache

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:java-kotlin'
