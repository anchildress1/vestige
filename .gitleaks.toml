title = "vestige gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Files allowed to contain false-positive secret-like strings."
# SonarCloud projectKey is a public identifier (visible at sonarcloud.io/dashboard?id=...),
# not a secret. It appears in three places:
#   1. gradle/wrapper/gradle-wrapper.properties — wrapper distribution URL noise
#      (whole-file allowance: this is generated infrastructure, not a place secrets land)
#   2. build.gradle.kts — Gradle DSL form for the org.sonarqube plugin
#      (regex-only allowance below; the rest of the file is still scanned)
#   3. sonar-project.properties — Java-properties form for SonarLint IDE connected
#      mode and the SonarQube MCP resolver, both of which require the verbatim line
#      (regex-only allowance below; per Copilot review, a whole-file allowance would
#      mask any future secret accidentally added to the same file)
paths = [
  "gradle/wrapper/gradle-wrapper.properties",
]
regexTarget = "match"
regexes = [
  '''sonar\.projectKey", "anchildress1_vestige"''',
  '''sonar\.projectKey=anchildress1_vestige''',
  # Model artifact SHA-256s in manifest.properties — public Hugging Face download checksums,
  # not secrets. High entropy trips the default generic-api-key rule otherwise.
  '''^[A-Za-z_]*sha256=[0-9a-f]{64}$''',
]
