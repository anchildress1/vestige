[versions]
# Build tooling
agp = "9.2.0"
kotlin = "2.3.21"
gradle = "9.5.0"

# AndroidX core
androidx-annotation = "1.10.0"
androidx-core-ktx = "1.18.0"
androidx-activity-compose = "1.13.0"
androidx-lifecycle = "2.10.0"

# Compose
compose-bom = "2026.05.00"

# Persistence
objectbox = "5.4.2"

# Inference — litertlm-android wraps Gemma 4 .litertlm execution and bundles libLiteRt.so.
# Pre-1.0 and moves fast; pin precisely and bump deliberately. Ships via Google Maven
# (https://dl.google.com/dl/android/maven2). The lower-level com.google.ai.edge.litert:litert
# coord exists at 2.1.4 but is intentionally NOT a direct dependency — adding it would collide
# on libLiteRt.so at :app:mergeDebugNativeLibs.
litert-lm = "0.11.0"

# Quality
kover = "0.9.8"
ktlint-cli = "1.8.0"
sonar = "7.3.0.8198"

# Coroutines
kotlinx-coroutines = "1.11.0"

# Testing
junit = "4.13.2"
junit-jupiter = "6.0.3"
junit-platform = "6.0.3"
mockk = "1.14.9"
turbine = "1.2.1"
# Android's android.jar ships org.json at runtime, but the AGP mockable jar stubs every method.
# Pin the upstream artifact for unit tests so JSON-driven parsers (LensResponseParser) exercise
# the real implementation. Same package coordinates as Android's built-in — production code
# stays on the platform implementation.
json = "20250517"
androidx-test-core = "1.7.0"
androidx-test-ext-junit = "1.3.0"
androidx-test-espresso = "3.7.0"
robolectric = "4.16.1"

[libraries]
androidx-annotation = { module = "androidx.annotation:annotation", version.ref = "androidx-annotation" }
androidx-core-ktx = { module = "androidx.core:core-ktx", version.ref = "androidx-core-ktx" }
androidx-activity-compose = { module = "androidx.activity:activity-compose", version.ref = "androidx-activity-compose" }
androidx-lifecycle-runtime-ktx = { module = "androidx.lifecycle:lifecycle-runtime-ktx", version.ref = "androidx-lifecycle" }
androidx-lifecycle-service = { module = "androidx.lifecycle:lifecycle-service", version.ref = "androidx-lifecycle" }
androidx-lifecycle-viewmodel-compose = { module = "androidx.lifecycle:lifecycle-viewmodel-compose", version.ref = "androidx-lifecycle" }

# Compose
compose-bom = { module = "androidx.compose:compose-bom", version.ref = "compose-bom" }
compose-ui = { module = "androidx.compose.ui:ui" }
compose-ui-graphics = { module = "androidx.compose.ui:ui-graphics" }
compose-ui-tooling = { module = "androidx.compose.ui:ui-tooling" }
compose-ui-tooling-preview = { module = "androidx.compose.ui:ui-tooling-preview" }
compose-ui-test-junit4 = { module = "androidx.compose.ui:ui-test-junit4" }
compose-ui-test-manifest = { module = "androidx.compose.ui:ui-test-manifest" }
compose-material3 = { module = "androidx.compose.material3:material3" }

# ObjectBox
objectbox-android = { module = "io.objectbox:objectbox-android", version.ref = "objectbox" }
objectbox-kotlin = { module = "io.objectbox:objectbox-kotlin", version.ref = "objectbox" }

# Inference (Gemma 4 via LiteRT-LM)
litert-lm = { module = "com.google.ai.edge.litertlm:litertlm-android", version.ref = "litert-lm" }

# Testing — JVM
junit = { module = "junit:junit", version.ref = "junit" }
junit-jupiter-api = { module = "org.junit.jupiter:junit-jupiter-api", version.ref = "junit-jupiter" }
junit-jupiter-engine = { module = "org.junit.jupiter:junit-jupiter-engine", version.ref = "junit-jupiter" }
junit-platform-launcher = { module = "org.junit.platform:junit-platform-launcher", version.ref = "junit-platform" }
junit-vintage-engine = { module = "org.junit.vintage:junit-vintage-engine", version.ref = "junit-jupiter" }
mockk = { module = "io.mockk:mockk", version.ref = "mockk" }
turbine = { module = "app.cash.turbine:turbine", version.ref = "turbine" }
kotlinx-coroutines-core = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-core", version.ref = "kotlinx-coroutines" }
kotlinx-coroutines-test = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-test", version.ref = "kotlinx-coroutines" }
robolectric = { module = "org.robolectric:robolectric", version.ref = "robolectric" }
json = { module = "org.json:json", version.ref = "json" }

# Testing — Android-aware (Robolectric + instrumented)
androidx-test-core = { module = "androidx.test:core", version.ref = "androidx-test-core" }
androidx-test-core-ktx = { module = "androidx.test:core-ktx", version.ref = "androidx-test-core" }
androidx-test-ext-junit = { module = "androidx.test.ext:junit", version.ref = "androidx-test-ext-junit" }
androidx-test-espresso-core = { module = "androidx.test.espresso:espresso-core", version.ref = "androidx-test-espresso" }

[plugins]
android-application = { id = "com.android.application", version.ref = "agp" }
android-library = { id = "com.android.library", version.ref = "agp" }
# AGP 9.0+ ships kotlin-android built in — no separate plugin needed for android modules.
# kotlin-jvm is required for pure-JVM modules (:core-model) that don't apply an Android plugin.
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
kotlin-compose = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }
kotlin-kapt = { id = "com.android.legacy-kapt", version.ref = "agp" }
objectbox = { id = "io.objectbox", version.ref = "objectbox" }
kover = { id = "org.jetbrains.kotlinx.kover", version.ref = "kover" }
sonar = { id = "org.sonarqube", version.ref = "sonar" }

[bundles]
compose-ui = ["compose-ui", "compose-ui-graphics", "compose-ui-tooling-preview", "compose-material3"]
compose-debug = ["compose-ui-tooling", "compose-ui-test-manifest"]
test-jvm = ["junit-jupiter-api", "mockk", "turbine", "kotlinx-coroutines-test"]
