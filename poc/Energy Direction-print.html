<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Vestige · Energy Direction (print)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  html, body {
    margin: 0; padding: 0;
    background: oklch(11% 0.010 55);
    font-family: 'Space Grotesk', system-ui, sans-serif;
    color: oklch(95% 0.015 85);
    -webkit-font-smoothing: antialiased;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  *, *::before, *::after {
    box-sizing: border-box;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .page {
    width: 100%;
    min-height: 100vh;
    padding: 36px 32px;
    background: oklch(11% 0.010 55);
    page-break-after: always;
    break-after: page;
    display: flex; flex-direction: column;
  }
  .page:last-child { page-break-after: auto; break-after: auto; }
  .phone-page {
    align-items: center; justify-content: flex-start;
    padding: 28px 32px 32px;
  }
  @page {
    size: letter portrait;
    margin: 0;
  }
  @media print {
    html, body { background: oklch(11% 0.010 55) !important; }
    .page {
      min-height: auto;
      height: 100vh;
      page-break-inside: avoid;
      break-inside: avoid;
    }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="energy-tokens.jsx"></script>
<script type="text/babel" src="energy-screens.jsx"></script>

<script type="text/babel">
function CoverPage() {
  return (
    <div className="page" style={{
      background: `
        radial-gradient(900px 600px at 10% -10%, oklch(20% 0.04 28 / 0.20), transparent 60%),
        radial-gradient(800px 700px at 110% 10%, oklch(20% 0.05 115 / 0.16), transparent 60%),
        oklch(11% 0.010 55)
      `,
    }}>
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center', maxWidth: 760, margin: '0 auto' }}>
        <div style={{
          fontFamily: ET.mono, fontSize: 11, fontWeight: 700,
          letterSpacing: '0.24em', textTransform: 'uppercase', color: E.lime,
        }}>● DIRECTION 02 · SCOREBOARD</div>
        <h1 style={{
          margin: '14px 0 0', fontFamily: ET.display, fontSize: 96,
          lineHeight: 0.85, color: E.ink, letterSpacing: '-0.005em',
          textTransform: 'uppercase',
        }}>STRAVA<br />FOR YOUR<br />ATTENTION<span style={{ color: E.coral }}>.</span></h1>
        <p style={{
          margin: '24px 0 0', maxWidth: 600,
          fontFamily: ET.sans, fontSize: 15, lineHeight: 1.55, color: E.dim,
        }}>
          The Mist direction read like Calm. <span style={{ color: E.ink }}>The concept is
          "the coach is a dick."</span> Warm dark replaces cool blue, electric lime
          replaces moonstone purple, Anton replaces Newsreader. Numbers hum.
          Recording is on-air. Patterns are box scores. The roast is a scorecard.
        </p>

        <div style={{
          marginTop: 32,
          display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 0,
          border: `1px solid ${E.hair}`,
          fontFamily: ET.mono, fontSize: 10, fontWeight: 600,
          textTransform: 'uppercase', letterSpacing: '0.16em',
        }}>
          {[
            ['Floor',   'warm espresso',   E.ink],
            ['Signal',  'electric lime',   E.lime],
            ['Heat',    'alarm coral',     E.coral],
            ['Cool',    'teal · resolved', E.teal],
            ['Display', 'anton condensed', E.ink],
            ['Body',    'space grotesk',   E.ink],
          ].map(([k, v, c], i) => (
            <div key={i} style={{
              padding: '10px 12px',
              borderRight: i % 3 !== 2 ? `1px solid ${E.hair}` : 'none',
              borderBottom: i < 3 ? `1px solid ${E.hair}` : 'none',
              display: 'flex', flexDirection: 'column', gap: 4,
            }}>
              <span style={{ color: E.faint }}>{k}</span>
              <span style={{ color: c, fontSize: 11 }}>{v}</span>
            </div>
          ))}
        </div>
      </div>

      <div style={{
        fontFamily: ET.mono, fontSize: 9, fontWeight: 700,
        letterSpacing: '0.20em', textTransform: 'uppercase', color: E.faint,
        textAlign: 'center', marginTop: 24,
      }}>VESTIGE · ENERGY DIRECTION · 5 SCREENS</div>
    </div>
  );
}

function PhonePage({ index, total, label, sub, accent, children }) {
  return (
    <div className="page phone-page">
      <div style={{
        width: '100%', maxWidth: 720, margin: '0 auto',
        display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
        marginBottom: 20,
      }}>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 12 }}>
          <span style={{
            fontFamily: ET.display, fontSize: 36, letterSpacing: '0.02em',
            color: accent || E.ink, lineHeight: 1,
          }}>{label}</span>
          <span style={{
            fontFamily: ET.mono, fontSize: 11, letterSpacing: '0.20em',
            textTransform: 'uppercase', color: E.dim, fontWeight: 700,
          }}>{sub}</span>
        </div>
        <span style={{
          fontFamily: ET.mono, fontSize: 10, letterSpacing: '0.20em',
          textTransform: 'uppercase', color: E.faint, fontWeight: 600,
        }}>{index} / {total}</span>
      </div>
      <div style={{ display: 'flex', justifyContent: 'center' }}>
        <div style={{
          width: 380, height: 800, borderRadius: 32,
          background: E.deep, overflow: 'hidden',
          border: `1px solid ${E.hair}`,
          boxShadow: `0 0 0 6px oklch(8% 0.008 55), 0 0 0 7px oklch(16% 0.012 55)`,
          display: 'flex', flexDirection: 'column',
          position: 'relative',
        }}>
          <div style={{
            padding: '12px 22px 4px',
            display: 'flex', justifyContent: 'space-between', alignItems: 'center',
            fontFamily: ET.mono, fontSize: 11, fontWeight: 600,
            color: E.ink, flexShrink: 0,
          }}>
            <span>9:41</span>
            <span style={{ color: E.dim }}>▲ ▮▮</span>
          </div>
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minHeight: 0, position: 'relative' }}>
            {children}
          </div>
        </div>
      </div>
    </div>
  );
}

function NotesPage() {
  return (
    <div className="page">
      <div style={{ maxWidth: 760, margin: '0 auto', width: '100%' }}>
        <div style={{
          fontFamily: ET.mono, fontSize: 11, fontWeight: 700,
          letterSpacing: '0.24em', textTransform: 'uppercase', color: E.lime,
        }}>● MOTION NOTES + TENSIONS</div>
        <h2 style={{
          margin: '12px 0 24px', fontFamily: ET.display, fontSize: 64,
          lineHeight: 0.85, color: E.ink, textTransform: 'uppercase',
        }}>HOW IT MOVES<span style={{ color: E.coral }}>.</span></h2>

        <div style={{
          display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 14,
        }}>
          {[
            ['REC PULSE', 'The on-air dot pulses 1.8s · breathing. Pressing it locks the timer in coral.'],
            ['NUMBERS TICK', 'Every stat sub-pixel jitters on update — a scoreboard tick, not a smooth count-up.'],
            ['DELTAS ARE LOUD', 'A ▲4 this week is the loudest thing on screen. If nothing changed, no delta — never invent motion.'],
            ['NO FOG DRIFT', 'Atmospheric drift is killed. Replaced with a tape-rule grain on cards — printed receipt energy.'],
            ['ROAST STAMP', 'The roast banner has halftone fill. Lands like a stamp, not a chat bubble.'],
            ['CHUNK COUNTDOWN', 'Recording shows a literal 30s bar with tick marks. The thing chunks. You see it chunk.'],
          ].map(([k, v]) => (
            <div key={k} style={{
              padding: '14px 16px', border: `1px solid ${E.hair}`,
              background: 'oklch(15% 0.012 55)',
            }}>
              <div style={{
                fontFamily: ET.mono, fontSize: 10, fontWeight: 700,
                letterSpacing: '0.20em', textTransform: 'uppercase', color: E.ink,
              }}>{k}</div>
              <div style={{
                marginTop: 8, fontFamily: ET.sans, fontSize: 12, lineHeight: 1.5,
                color: E.dim,
              }}>{v}</div>
            </div>
          ))}
        </div>

        <div style={{
          marginTop: 32, padding: '18px 20px',
          border: `1px solid ${E.coralSoft}`,
          background: 'oklch(20% 0.08 28 / 0.18)',
        }}>
          <div style={{
            fontFamily: ET.mono, fontSize: 11, fontWeight: 700,
            letterSpacing: '0.20em', textTransform: 'uppercase', color: E.coral,
          }}>● TENSIONS WITH design-guidelines.md</div>
          <div style={{
            marginTop: 12, fontFamily: ET.sans, fontSize: 13, lineHeight: 1.6,
            color: E.ink,
          }}>
            This direction <span style={{ color: E.coral, fontWeight: 700 }}>breaks four rules</span> in
            the current spec, on purpose: <em>"Restrained in the visuals"</em> (we made them loud),
            <em> "Quiet. Observational."</em> (we kept observational, killed quiet),
            <em> "No celebrations"</em> (deltas celebrate streaks — small, dry, but they do),
            and the <em>glow/vapor purple-and-blue accent system</em> (replaced wholesale).
            The bite stays in the words — the visuals just got off the couch.
          </div>
        </div>
      </div>
    </div>
  );
}

function PrintDoc() {
  return (
    <>
      <CoverPage />
      <PhonePage index="01" total="05" label="CAPTURE" sub="IDLE"        accent={E.ink}>   <EnergyCapture /></PhonePage>
      <PhonePage index="02" total="05" label="CAPTURE" sub="ON AIR"      accent={E.coral}> <EnergyCaptureLive /></PhonePage>
      <PhonePage index="03" total="05" label="PATTERNS" sub="BOX SCORES" accent={E.lime}>  <EnergyPatterns /></PhonePage>
      <PhonePage index="04" total="05" label="DETAIL" sub="TUE MEETINGS" accent={E.ink}>   <EnergyPatternDetail /></PhonePage>
      <PhonePage index="05" total="05" label="ROAST" sub="HARDASS"       accent={E.coral}> <EnergyRoast /></PhonePage>
      <NotesPage />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PrintDoc />);

// Auto-print after fonts + JSX have loaded
(async () => {
  try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch (e) {}
  await new Promise((r) => setTimeout(r, 700));
  window.print();
})();
</script>
</body>
</html>
