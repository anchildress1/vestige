# SonarCloud project identity — mirrors the sonar {} block in build.gradle.kts.
# Analysis runs via Gradle (./gradlew sonar); this file is the canonical key reference
# for SonarLint IDE connected mode and the SonarQube MCP resolver.
sonar.projectKey=anchildress1_vestige
sonar.organization=anchildress1
sonar.projectName=Vestige
sonar.host.url=https://sonarcloud.io

# Language
sonar.java.source=17
sonar.kotlin.source.version=2.3

# Coverage — Kover XML aggregated at the root project level.
sonar.kotlin.coveragePlugin=jacoco
sonar.coverage.jacoco.xmlReportPaths=build/reports/kover/report.xml

# Test results — one path per module, comma-separated.
sonar.junit.reportPaths=\
  app/build/test-results/testDebugUnitTest,\
  core-inference/build/test-results/testDebugUnitTest,\
  core-model/build/test-results/test,\
  core-storage/build/test-results/testDebugUnitTest

# Exclusions — generated / build artefacts and scaffolding that carry no business logic.
sonar.exclusions=\
  **/build/**,\
  **/generated/**,\
  **/*.gradle.kts,\
  **/objectbox-models/**

# Coverage exclusions — entry-points and hardware-bound classes tested only on-device.
# `ui/atmosphere/FogDrift.kt` + `ui/components/AccentModifiers.kt` carry only draw-scope
# lambdas that don't execute under Robolectric's non-rendering canvas; the pure pieces (e.g.
# `clampGrainOpacity`, `fogCenter`, accent constants) are tested directly via JVM tests, and
# render-path correctness is covered by the on-device manual checklist instead of line counting.
sonar.coverage.exclusions=\
  **/ui/theme/**,\
  **/ui/atmosphere/FogDrift.kt,\
  **/ui/components/AccentModifiers.kt,\
  **/VestigeApplication.kt,\
  **/MainActivity.kt,\
  **/LiteRtLmEngine.kt,\
  **/AudioCapture.kt

# Quality gate
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
