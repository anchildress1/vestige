sonar.projectKey=anchildress1_vestige
sonar.organization=anchildress1
sonar.host.url=https://sonarcloud.io

sonar.sources=\
  app/src/main/kotlin,\
  core-inference/src/main/kotlin,\
  core-model/src/main/kotlin,\
  core-storage/src/main/kotlin

sonar.tests=\
  app/src/test/kotlin,\
  app/src/androidTest/kotlin,\
  core-inference/src/test/kotlin,\
  core-model/src/test/kotlin,\
  core-storage/src/test/kotlin

sonar.test.inclusions=**/*Test.kt,**/*Spec.kt

sonar.kotlin.coveragePlugin=jacoco
sonar.coverage.jacoco.xmlReportPaths=app/build/reports/kover/report.xml

sonar.junit.reportPaths=\
  app/build/test-results/testDebugUnitTest,\
  core-inference/build/test-results/testDebugUnitTest,\
  core-model/build/test-results/test,\
  core-storage/build/test-results/testDebugUnitTest

sonar.exclusions=**/build/**,**/generated/**,**/*.gradle.kts,**/objectbox-models/**
sonar.coverage.exclusions=**/ui/theme/**,**/VestigeApplication.kt,**/MainActivity.kt
