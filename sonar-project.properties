sonar.projectKey=anchildress1_vestige
sonar.organization=anchildress1
sonar.host.url=https://sonarcloud.io

sonar.sources=app/src/main/kotlin
# Only list test source roots that actually exist. Add app/src/androidTest/kotlin once
# instrumented tests land — Sonar errors out on missing paths.
sonar.tests=app/src/test/kotlin
sonar.test.inclusions=**/*Test.kt,**/*Spec.kt

sonar.kotlin.coveragePlugin=jacoco
sonar.coverage.jacoco.xmlReportPaths=app/build/reports/kover/report.xml

sonar.exclusions=**/build/**,**/generated/**,**/*.gradle.kts,**/objectbox-models/**
sonar.coverage.exclusions=**/ui/theme/**,**/VestigeApplication.kt,**/MainActivity.kt
